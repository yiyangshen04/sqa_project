[tool.ruff]
target-version = "py312"
line-length = 88
exclude = [
    ".venv",
    "*/migrations/*",
    "db.sqlite3",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "SIM", "B"]

[tool.ruff.lint.per-file-ignores]
"uat/uat_data.py" = ["E501"]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "pollme.settings"
python_files = ["test_*.py"]
testpaths = ["qa_tests"]
